<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #050505;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }

  .hero {
    text-align: center;
    flex-shrink: 0;
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  .hero-title {
    font-size: 36px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 3px;
  }

  .hero-tagline {
    font-size: 16px;
    color: #555;
  }

  .hero-tagline .typed {
    color: #888;
    border-right: 2px solid #888;
    padding-right: 2px;
    display: inline-block;
    min-width: 380px;
    text-align: left;
  }

  .hero-tagline .typed a {
    color: #888;
    text-decoration: none;
    border-bottom: 1px solid #333;
    transition: color 0.15s, border-color 0.15s;
  }

  .hero-tagline .typed a:hover {
    color: #fff;
    border-color: #fff;
  }

  .terminal {
    width: 60vw;
    height: 75vh;
    background: #0a0a0a;
    border: 1px solid #222;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .titlebar {
    display: flex;
    align-items: center;
    height: 36px;
    background: #111;
    border-bottom: 1px solid #222;
    padding: 0 14px;
    flex-shrink: 0;
    user-select: none;
  }

  .titlebar-dots {
    display: flex;
    gap: 7px;
  }

  .titlebar-dots span {
    width: 11px;
    height: 11px;
    border-radius: 50%;
  }

  .dot-r { background: #444; }
  .dot-y { background: #333; }
  .dot-g { background: #333; }

  .titlebar-text {
    flex: 1;
    text-align: center;
    font-size: 11px;
    color: #555;
    letter-spacing: 0.5px;
  }

  .body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 24px;
    overflow: hidden;
    cursor: text;
  }

  .output {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
  }
  .output::-webkit-scrollbar { display: none; }

  .line {
    line-height: 1.7;
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .line.fade {
    opacity: 0;
    animation: fadeIn 0.05s forwards;
  }

  .line.prompt  { color: #555; }
  .line.output  { color: #ccc; }
  .line.dim     { color: #444; }
  .line.bright  { color: #fff; }
  .line.heading {
    color: #fff;
    font-weight: 700;
    font-size: 15px;
  }
  .line.brand {
    color: #fff;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 1px;
  }
  .line.table-header {
    color: #666;
    border-bottom: 1px solid #1a1a1a;
    padding-bottom: 3px;
    margin-bottom: 2px;
  }
  .line.highlight {
    background: #151515;
    padding: 2px 6px;
    border-radius: 3px;
    display: inline-block;
    color: #fff;
  }
  .line.error { color: #888; }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .input-line {
    display: flex;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
    line-height: 1.7;
    font-size: 13px;
    min-height: 22px;
  }

  .input-prompt {
    color: #555;
    flex-shrink: 0;
    margin-right: 8px;
  }

  .input-text {
    color: #fff;
  }

  .cursor {
    color: #fff;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  @media (max-width: 900px) {
    .terminal { width: 95%; height: 90%; }
    .body { padding: 12px; }
    .line { font-size: 11px; }
  }
</style>

// Aliases — fuzzy match user input to scene keys
const aliases = {
  'help': 'lpcli',
  'lpcli help': 'lpcli',
  'lpcli discover': 'lpcli discover SOL',
  'discover': 'lpcli discover SOL',
  'discover sol': 'lpcli discover SOL',
  'init': 'lpcli init',
  'perps': 'lpcli perps trade',
  'lpcli perps': 'lpcli perps trade',
  'perps trade': 'lpcli perps trade',
  'swap': 'lpcli swap',
  'predict': 'lpcli predict',
  'eliza': 'lpcli eliza',
  'lpcli agent': 'lpcli eliza',
  'agent': 'lpcli eliza',
};

let inputBuffer = '';
let history = [];
let historyIndex = -1;
let pendingTimers = [];
let locked = false; // lock input while output animating

const output = document.getElementById('output');
const inputText = document.getElementById('input-text');

function addLine(text, type, fade) {
  const div = document.createElement('div');
  div.className = 'line ' + type + (fade ? ' fade' : '');
  div.textContent = text;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function clearPending() {
  pendingTimers.forEach(t => clearTimeout(t));
  pendingTimers = [];
}

function runCommand(cmd) {
  const trimmed = cmd.trim();
  if (!trimmed) return;

  // Add prompt line to output
  addLine('$ ' + trimmed, 'prompt', false);

  // Push to history
  history.push(trimmed);
  historyIndex = history.length;

  // Clear
  if (trimmed === 'clear') {
    output.innerHTML = '';
    return;
  }

  // Resolve command
  const lower = trimmed.toLowerCase();
  let sceneKey = null;

  // Direct match
  if (scenes[trimmed]) {
    sceneKey = trimmed;
  } else if (scenes[lower]) {
    sceneKey = lower;
  } else if (aliases[lower]) {
    sceneKey = aliases[lower];
  }

  if (!sceneKey) {
    addLine('  command not found: ' + trimmed, 'error', true);
    addLine('  type "lpcli" to see available commands.', 'dim', true);
    return;
  }

  // Render scene lines with stagger
  const lines = scenes[sceneKey];
  locked = true;

  lines.forEach((line, i) => {
    const t = setTimeout(() => {
      addLine(line.text, line.type, true);
      if (i === lines.length - 1) {
        locked = false;
      }
    }, i * 40);
    pendingTimers.push(t);
  });
}

// Keyboard handler — capture all typing
document.addEventListener('keydown', (e) => {
  // Ctrl+C — cancel animation, clear input
  if (e.key === 'c' && e.ctrlKey) {
    e.preventDefault();
    clearPending();
    locked = false;
    if (inputBuffer.length > 0) {
      addLine('$ ' + inputBuffer + '^C', 'prompt', false);
      inputBuffer = '';
      inputText.textContent = '';
    }
    return;
  }

  // Ctrl+L — clear screen
  if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    clearPending();
    locked = false;
    output.innerHTML = '';
    return;
  }

  if (locked) return;

  // Enter — execute
  if (e.key === 'Enter') {
    e.preventDefault();
    const cmd = inputBuffer;
    inputBuffer = '';
    inputText.textContent = '';
    runCommand(cmd);
    return;
  }

  // Backspace
  if (e.key === 'Backspace') {
    e.preventDefault();
    inputBuffer = inputBuffer.slice(0, -1);
    inputText.textContent = inputBuffer;
    return;
  }

  // Arrow up — history back
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (history.length > 0 && historyIndex > 0) {
      historyIndex--;
      inputBuffer = history[historyIndex];
      inputText.textContent = inputBuffer;
    }
    return;
  }

  // Arrow down — history forward
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex < history.length - 1) {
      historyIndex++;
      inputBuffer = history[historyIndex];
      inputText.textContent = inputBuffer;
    } else {
      historyIndex = history.length;
      inputBuffer = '';
      inputText.textContent = '';
    }
    return;
  }

  // Tab — autocomplete
  if (e.key === 'Tab') {
    e.preventDefault();
    const lower = inputBuffer.toLowerCase();
    const allCmds = Object.keys(scenes).concat(Object.keys(aliases)).concat(['clear']);
    const match = allCmds.find(c => c.startsWith(lower) && c !== lower);
    if (match) {
      inputBuffer = match;
      inputText.textContent = inputBuffer;
    }
    return;
  }

  // Ignore modifier keys, function keys, etc
  if (e.key.length > 1) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;

  // Type character
  e.preventDefault();
  inputBuffer += e.key;
  inputText.textContent = inputBuffer;
});

// Click terminal body to focus
document.getElementById('body').addEventListener('click', () => {
  // Just ensures keydown listener works (it's on document, always active)
});

// Boot — auto-run lpcli on load
runCommand('lpcli');

// Typewriter tagline rotation

const phrases = [

    html: 'wallet is local (<a href="https://x.com/OpenWallet" target="_blank">@OpenWallet</a>)',

  {

    html: 'compute is decentralized (<a href="https://x.com/nosana_ai" target="_blank">@nosana_ai</a>)',

    plain: 'trading is on-chain (@solana)',
    html: 'trading is on-chain (<a href="https://x.com/solana" target="_blank">@solana</a>)',
  },
  {
    plain: 'no centralized dependency anywhere',
    html: 'no centralized dependency anywhere',
  },
];

const typedEl = document.getElementById('typed');
let phraseIdx = 0;

function typeErase() {
  const phrase = phrases[phraseIdx];
  let charIdx = 0;

  function typeForward() {
    if (charIdx <= phrase.plain.length) {
      typedEl.textContent = phrase.plain.slice(0, charIdx);
      charIdx++;
      setTimeout(typeForward, 60 + Math.random() * 30);
    } else {
      // Replace with HTML version (clickable links)
      typedEl.innerHTML = phrase.html;
      setTimeout(eraseBack, 2000);
    }
  }

  function eraseBack() {
    if (charIdx > 0) {
      charIdx--;
      typedEl.textContent = phrase.plain.slice(0, charIdx);
      setTimeout(eraseBack, 30 + Math.random() * 20);
    } else {
      phraseIdx = (phraseIdx + 1) % phrases.length;
      setTimeout(typeErase, 400);
    }
  }

  typeForward();
}

typeErase();
